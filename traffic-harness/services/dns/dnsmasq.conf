# Answer a handful of local lab names so the dns generator produces real UDP 53
# lookups. Addresses are arbitrary lab values (the flow shape is what matters).
no-resolv
no-hosts
log-queries
listen-address=0.0.0.0
bind-interfaces

address=/web/10.10.0.10
address=/db/10.10.0.11
address=/ssh/10.10.0.12
address=/mail/10.10.0.13
address=/lab.local/10.10.0.20
address=/app.lab.local/10.10.0.21
